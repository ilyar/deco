name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          expected_version="${GITHUB_REF_NAME#v}"
          actual_version="$(python3 -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("Cargo.toml").read_text(encoding="utf-8"))["workspace"]["package"]["version"])')"
          if [[ "$actual_version" != "$expected_version" ]]; then
            echo "tag version $expected_version does not match workspace version $actual_version" >&2
            exit 1
          fi
          prerelease="false"
          if [[ "$expected_version" == *-* ]]; then
            prerelease="true"
          fi
          echo "version=$actual_version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build root binary for integration tests
        run: cargo build -q -p deco

      - name: Run release quality gates
        env:
          CARGO_BIN_EXE_deco: ${{ github.workspace }}/target/debug/deco
        run: |
          cargo fmt --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test -q --workspace --exclude deco-cli
          cargo test -q -p deco-cli --lib
          cargo test -q -p deco-cli --test cli_smoke
          cargo test -q -p deco-cli --test parity_harness

  build-native:
    needs: [prepare, verify]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/deco
            archive_type: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/deco.exe
            archive_type: zip
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/deco
            archive_type: tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/deco
            archive_type: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build release binary
        run: cargo build --release --locked -p deco --target ${{ matrix.target }}

      - name: Package Unix release asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/package-unix.sh
          scripts/package-unix.sh \
            "${{ needs.prepare.outputs.version }}" \
            "${{ matrix.target }}" \
            "${{ matrix.binary_path }}" \
            dist

      - name: Package Windows release asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/package-windows.ps1 `
            -Version "${{ needs.prepare.outputs.version }}" `
            -Target "${{ matrix.target }}" `
            -BinaryPath "${{ matrix.binary_path }}" `
            -OutputDir "dist"

      - name: Generate provenance attestation for archive
        uses: actions/attest@v4
        with:
          subject-path: dist/deco-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_type }}

      - name: Generate provenance attestation for checksum
        uses: actions/attest@v4
        with:
          subject-path: dist/deco-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_type }}.sha256

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/deco-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_type }}
            dist/deco-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_type }}.sha256

  build-linux-arm64:
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-musl

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install cross
        run: cargo install cross --locked

      - name: Build Linux ARM64 release binary
        run: cross build --release --locked -p deco --target aarch64-unknown-linux-musl

      - name: Package Linux ARM64 release asset
        shell: bash
        run: |
          chmod +x scripts/package-unix.sh
          scripts/package-unix.sh \
            "${{ needs.prepare.outputs.version }}" \
            "aarch64-unknown-linux-musl" \
            "target/aarch64-unknown-linux-musl/release/deco" \
            dist

      - name: Generate provenance attestation for archive
        uses: actions/attest@v4
        with:
          subject-path: dist/deco-v${{ needs.prepare.outputs.version }}-aarch64-unknown-linux-musl.tar.gz

      - name: Generate provenance attestation for checksum
        uses: actions/attest@v4
        with:
          subject-path: dist/deco-v${{ needs.prepare.outputs.version }}-aarch64-unknown-linux-musl.tar.gz.sha256

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-aarch64-unknown-linux-musl
          path: |
            dist/deco-v${{ needs.prepare.outputs.version }}-aarch64-unknown-linux-musl.tar.gz
            dist/deco-v${{ needs.prepare.outputs.version }}-aarch64-unknown-linux-musl.tar.gz.sha256

  build-freebsd:
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FreeBSD release binary
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          sync: rsync
          run: |
            set -euo pipefail
            pkg install -y bash curl
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            . "$HOME/.cargo/env"
            cargo build --release --locked -p deco
            bash scripts/package-unix.sh \
              "${{ needs.prepare.outputs.version }}" \
              "x86_64-unknown-freebsd" \
              "target/release/deco" \
              "dist"

      - name: Generate provenance attestation for archive
        uses: actions/attest@v4
        with:
          subject-path: dist/deco-v${{ needs.prepare.outputs.version }}-x86_64-unknown-freebsd.tar.gz

      - name: Generate provenance attestation for checksum
        uses: actions/attest@v4
        with:
          subject-path: dist/deco-v${{ needs.prepare.outputs.version }}-x86_64-unknown-freebsd.tar.gz.sha256

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64-unknown-freebsd
          path: |
            dist/deco-v${{ needs.prepare.outputs.version }}-x86_64-unknown-freebsd.tar.gz
            dist/deco-v${{ needs.prepare.outputs.version }}-x86_64-unknown-freebsd.tar.gz.sha256

  publish:
    needs:
      - prepare
      - build-native
      - build-linux-arm64
      - build-freebsd
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Write release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<EOF
          ## deco ${GITHUB_REF_NAME}

          First public alpha release with downloadable binaries for Linux, Windows, macOS, and FreeBSD.

          Included assets:

          - \`deco-v${{ needs.prepare.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz\`
          - \`deco-v${{ needs.prepare.outputs.version }}-aarch64-unknown-linux-musl.tar.gz\`
          - \`deco-v${{ needs.prepare.outputs.version }}-x86_64-pc-windows-msvc.zip\`
          - \`deco-v${{ needs.prepare.outputs.version }}-x86_64-apple-darwin.tar.gz\`
          - \`deco-v${{ needs.prepare.outputs.version }}-aarch64-apple-darwin.tar.gz\`
          - \`deco-v${{ needs.prepare.outputs.version }}-x86_64-unknown-freebsd.tar.gz\`
          - one \`.sha256\` file per archive

          Provenance:

          This release publishes GitHub artifact attestations for every archive and checksum so consumers can verify the supply chain with:

          \`\`\`sh
          gh attestation verify PATH/TO/ARTIFACT -R ${{ github.repository }}
          \`\`\`

          License: MIT
          Author: ilyar
          EOF

      - name: Create or update GitHub release
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "no release assets were downloaded" >&2
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md
          else
            prerelease_flag=()
            if [[ "${{ needs.prepare.outputs.prerelease }}" == "true" ]]; then
              prerelease_flag+=(--prerelease)
            fi
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md \
              "${prerelease_flag[@]}"
          fi

name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build root binary for integration tests
        run: cargo build -q -p deco

      - name: Run workspace tests
        env:
          CARGO_BIN_EXE_deco: ${{ github.workspace }}/target/debug/deco
        run: cargo test -q

      - name: Run local parity harness
        env:
          CARGO_BIN_EXE_deco: ${{ github.workspace }}/target/debug/deco
        run: cargo test -q -p deco-cli --test parity_harness
